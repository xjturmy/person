# ─────────────────────────────────────────────────────────────────────────
# 持仓档案 v1 (v2.7 基础版)
# ─────────────────────────────────────────────────────────────────────────
# 字段说明:
#   ticker        — 6 位股票代码(港股 5 位)
#   name          — 公司名(与 02_companies/ 子目录名对齐)
#   school        — 流派标签:价值 / 成长 / 周期 / 防御
#   rationale     — 一句话买入依据(刻意限制 < 50 字,长版留 02_companies/05_投资决策/)
#   criteria_met  — 入选硬门槛(当时满足的 checkbox,显示在「选择标准」expander)
#   review_triggers — 反向风险(任一成立即重审,显示在「选择标准」expander 底部)
#
# 占位说明:
#   下面所有 rationale / criteria_met / review_triggers 都是按公司类型预填的"草稿",
#   用户应按自己实际情况修改;改完后此 yaml 是唯一权威来源。
# ─────────────────────────────────────────────────────────────────────────

positions:

  # ─── 价值流派(高股息 + 高 ROE + 低估值)──────────────────────────────
  - ticker: "600519"
    name: "贵州茅台"
    school: "价值"
    rationale: "高股息高 ROE 长期复利,PE-TTM 10y 10% 分位附近介入"
    criteria_met:
      - "PE-TTM 10y 分位 ≤ 25%"
      - "ROE 5y 均 ≥ 20%"
      - "股息率 ≥ 2.5%"
      - "连续 10y 盈利"
      - "FCF / 净利润 ≥ 0.8"
    review_triggers:
      - "ROE 跌破 20% 连续 2 年"
      - "股息率跌破 2%"
      - "PE 分位升至 75% 以上"

  - ticker: "000858"
    name: "五粮液"
    school: "价值"
    rationale: "高端白酒老二 + 高股息,PE 接近 10y 低位介入"
    criteria_met:
      - "PE-TTM 10y 分位 ≤ 30%"
      - "ROE 5y 均 ≥ 18%"
      - "股息率 ≥ 3%"
      - "连续 10y 盈利"
    review_triggers:
      - "ROE 跌破 18% 连续 2 年"
      - "白酒批价系统性下跌 30%"
      - "PE 分位升至 70% 以上"

  - ticker: "000333"
    name: "美的集团"
    school: "价值"
    rationale: "家电龙头 + 高股息,PEG < 1 时按林奇 Stalwart 介入"
    criteria_met:
      - "PE-TTM 10y 分位 ≤ 40%"
      - "ROE 5y 均 ≥ 22%"
      - "股息率 ≥ 4%"
      - "PEG < 1"
    review_triggers:
      - "PEG 升至 1.5 以上"
      - "海外业务增速跌破 15%"
      - "股息率跌破 2.5%"

  - ticker: "600887"
    name: "伊利股份"
    school: "价值"
    rationale: "乳业双寡头 + 高股息,PE 10y 分位 30% 以下介入"
    criteria_met:
      - "PE-TTM 10y 分位 ≤ 30%"
      - "ROE 5y 均 ≥ 18%"
      - "股息率 ≥ 4%"
      - "毛利率稳定 ≥ 30%"
    review_triggers:
      - "原奶价格剧烈波动持续 1 年"
      - "市占率被蒙牛超越"
      - "股息率跌破 3%"

  # ─── 防御流派(银行/保险,Graham 不适用,看 PB)──────────────────────
  - ticker: "600036"
    name: "招商银行"
    school: "防御"
    rationale: "银行业 ROE 领跑 + 零售护城河,PB < 1.0 介入"
    criteria_met:
      - "PB ≤ 1.0"
      - "ROE 5y 均 ≥ 15%"
      - "股息率 ≥ 5%"
      - "不良率 ≤ 1.5%"
      - "拨备覆盖 ≥ 300%"
    review_triggers:
      - "不良率连续 2 季度升至 2% 以上"
      - "ROE 跌破 13%"
      - "拨备覆盖跌破 200%"

  - ticker: "601336"
    name: "新华保险"
    school: "防御"
    rationale: "寿险周期底部 + EV 折价,PEV < 0.5 介入"
    criteria_met:
      - "P/EV ≤ 0.5"
      - "新业务价值率 ≥ 10%"
      - "投资收益率 ≥ 4%"
      - "股息率 ≥ 3%"
    review_triggers:
      - "新业务价值率跌破 8%"
      - "投资端连续 2 年亏损"
      - "P/EV 升至 1.0 以上"

  # ─── 成长流派(高增速 + PEG < 1)─────────────────────────────────────
  - ticker: "002594"
    name: "比亚迪"
    school: "成长"
    rationale: "新能源车龙头 + 全球扩张,PEG < 1 时介入"
    criteria_met:
      - "营收 3y CAGR ≥ 30%"
      - "净利润 3y CAGR ≥ 40%"
      - "PEG < 1"
      - "毛利率 ≥ 18%"
    review_triggers:
      - "新能源车渗透率见顶(>60%)"
      - "海外业务增速跌破 20%"
      - "毛利率跌破 15%"

  - ticker: "002050"
    name: "三花智控"
    school: "成长"
    rationale: "热管理隐形冠军 + 人形机器人增量,PEG < 1.5 介入"
    criteria_met:
      - "营收 3y CAGR ≥ 20%"
      - "ROE 5y 均 ≥ 18%"
      - "净利率 ≥ 12%"
      - "PEG < 1.5"
    review_triggers:
      - "新能源车热管理订单连续 2 季度负增长"
      - "毛利率跌破 25%"
      - "PEG 升至 2.0 以上"

  - ticker: "002475"
    name: "立讯精密"
    school: "成长"
    rationale: "果链龙头 + 汽车业务增量,PE 10y 分位 30% 以下介入"
    criteria_met:
      - "PE-TTM 10y 分位 ≤ 30%"
      - "营收 3y CAGR ≥ 25%"
      - "ROE 5y 均 ≥ 15%"
      - "净利率 ≥ 5%"
    review_triggers:
      - "苹果订单份额下滑"
      - "汽车业务增速跌破 50%"
      - "净利率跌破 4%"

  - ticker: "300308"
    name: "中际旭创"
    school: "成长"
    rationale: "光模块龙头 + AI 算力周期,PEG < 1 时介入"
    criteria_met:
      - "营收 3y CAGR ≥ 40%"
      - "净利润 3y CAGR ≥ 50%"
      - "PEG < 1"
      - "毛利率 ≥ 30%"
    review_triggers:
      - "AI 资本开支放缓"
      - "800G/1.6T 渗透率见顶"
      - "毛利率跌破 25%"

  - ticker: "300750"
    name: "宁德时代"
    school: "成长"
    rationale: "电池龙头 + 储能爆发,PE 10y 分位 30% 以下介入"
    criteria_met:
      - "PE-TTM 10y 分位 ≤ 30%"
      - "营收 3y CAGR ≥ 30%"
      - "ROE 5y 均 ≥ 18%"
      - "毛利率 ≥ 22%"
    review_triggers:
      - "市占率被 LG/比亚迪超越"
      - "储能业务增速跌破 50%"
      - "毛利率跌破 18%"

  - ticker: "600276"
    name: "恒瑞医药"
    school: "成长"
    rationale: "创新药龙头 + ADC 管线,PE 10y 分位 40% 以下介入"
    criteria_met:
      - "PE-TTM 10y 分位 ≤ 40%"
      - "营收 3y CAGR ≥ 15%"
      - "研发费用率 ≥ 15%"
      - "ROE 5y 均 ≥ 12%"
    review_triggers:
      - "重磅创新药临床失败"
      - "海外授权进度连续 2 年低于预期"
      - "毛利率跌破 80%"

  - ticker: "02097"
    name: "蜜雪集团"
    school: "成长"
    rationale: "茶饮万店连锁 + 出海,港股估值折价介入"
    criteria_met:
      - "营收 3y CAGR ≥ 30%"
      - "门店数年增 ≥ 20%"
      - "净利率 ≥ 15%"
      - "PEG < 1.5"
    review_triggers:
      - "门店增速跌破 10%"
      - "同店收入连续 2 季度负增长"
      - "净利率跌破 12%"

  # ─── 周期流派(底部 + PB 低估)──────────────────────────────────────
  - ticker: "603379"
    name: "三美股份"
    school: "周期"
    rationale: "氟化工龙头 + 三代制冷剂配额改革,周期底部介入"
    criteria_met:
      - "PB 10y 分位 ≤ 30%"
      - "三代制冷剂价格底部反转"
      - "毛利率 ≥ 20%"
      - "无重大债务"
    review_triggers:
      - "制冷剂价格回落至成本线"
      - "毛利率跌破 15%"
      - "PB 分位升至 70% 以上"

  - ticker: "601766"
    name: "中国中车"
    school: "周期"
    rationale: "高铁装备龙头 + 海外订单回暖,PB 历史低位介入"
    criteria_met:
      - "PB 10y 分位 ≤ 30%"
      - "ROE 5y 均 ≥ 8%"
      - "股息率 ≥ 3%"
      - "在手订单 ≥ 营收 2 倍"
    review_triggers:
      - "新签订单连续 2 年下滑"
      - "ROE 跌破 6%"
      - "PB 分位升至 60% 以上"
