# === yaml 评分 vs graham_steps.py 五步法对照(v2.5 G5 文档化) ===
# Step 1 (类别)   → 不进 yaml 评分(由 graham_steps.py ABCD 分类输出)
# Step 2 (基本面) → g1_size + g2_financial_strength + g3_earnings_stability
# Step 3 (估值)   → g6_pe_moderate + g7_pb_moderate + graham_number_check
# Step 4 (派息)   → g4_dividend_record + g5_earnings_growth
# Step 5 (NCAV)   → ncav_critical_bonus(v2.5 新增,深度价值信号)
# 详见 .tools/dashboard/graham_extras.py 的 STEPS_TO_YAML_RULES_MAP
# ====================================================================

master: graham
master_cn: 本杰明·格雷厄姆
method: 防御型投资者 7 项标准 + Graham Number
score_type: composite
max_score: 13   # v2.5 G4 加 ncav bonus(原 10 + 3)
description: |
  深度价值投资法 — 用安全边际买便宜资产。
  组合：防御型投资者 7 项硬指标（《聪明的投资者》第 14 章）
       + Graham Number 估值上限（√(22.5 × EPS × BVPS)）
       + 净流动资产估值（Net-Net）

  核心思想：5 毛钱买 1 块钱的资产 → 安全边际为王

# v2.5 G1:行业自动路由 — screener 入口按 industry_l2 分流到银行/保险变体
industry_router:
  mode: auto
  fallback: graham.yaml
  routes:
    bank: graham_bank.yaml          # industry_l2 含 "银行"(股份制/城商/农商/国有大行)
    insurance: graham_insurance.yaml # industry_l2 含 "保险/寿险/财险"
  router_module: .tools.dashboard.graham_router

threshold:
  excellent: 8
  good: 6
  warning: 4

# Graham Number 估值公式
graham_number:
  formula: sqrt(22.5 * eps * bvps)
  meaning: 防御型投资者的"合理价格上限"
  origin: 22.5 = 15(PE 上限) × 1.5(PB 上限)
  rule: 当前股价 < Graham Number → 估值合理偏低

# Net-Net 净流动资产估值（深度价值）
net_net:
  formula: |
    NCAV = current_assets - total_liabilities
    NetNet_per_share = NCAV / shares_outstanding
  rule: 当前股价 < NetNet × 2/3 → 极度低估
  caution: |
    A 股极少出现（市场效率较高）；
    适合熊市底部 / 困境反转投资

# 防御型投资者 7 项硬指标（《聪明的投资者》Ch.14）
rules:
  - id: g1_size
    name: 公司规模充足
    formula: market_cap >= 5e10           # A 股标准：500 亿元（原版 USD 2 亿放大）
    weight: 1
    score_if_pass: 1
    score_if_fail: 0
    notes: 排除小盘股（流动性 + 经营稳定性）

  - id: g2_financial_strength
    name: 财务结构稳健
    formula: current_ratio >= 2.0 AND long_term_debt <= net_current_assets
    weight: 1
    score_if_pass: 1
    score_if_fail: 0
    data_source: safety
    notes: 流动比率 ≥ 2 + 长期负债 ≤ 净流动资产

  - id: g3_earnings_stability
    name: 盈利稳定性（10 年无亏损）
    formula: min(earnings_per_share, 10) > 0
    weight: 2
    score_if_pass: 2
    score_if_fail: 0
    data_source: profitability
    notes: 过去 10 年每年都盈利

  - id: g4_dividend_record
    name: 持续派息记录
    formula: years_continuous_dividend >= 10        # 原版要求 20 年，A 股放宽到 10 年
    weight: 1
    score_if_pass: 1
    score_if_fail: 0
    data_source: valuation.dividend_yield
    derived: years_continuous_dividend              # v2.5 G3:派生指标实现
    notes: A 股放宽（公司历史短）；连续派息年数从 valuation 时序计算

  - id: g5_earnings_growth
    name: 盈利增长（10 年 ≥ 33%）
    formula: cagr(eps_3y_avg, 10) >= 0.029           # 33% 累计 ≈ 2.9% CAGR
    weight: 1
    score_if_pass: 1
    score_if_fail: 0
    notes: 用 3 年平均 EPS 平滑波动

  - id: g6_pe_moderate
    name: 市盈率温和（≤ 15）
    formula: pe_ttm <= 15
    weight: 2
    score_if_pass: 2
    score_if_fail: 0
    data_source: valuation.pe_ttm

  # v2.5 G2:PE×PB OR 条件 — 高 ROE 公司允许更高 PB(茅台救活)
  - id: g7_pb_moderate
    name: 市净率温和（≤ 1.5,或 PE×PB ≤ 22.5）
    formula_primary: pb <= 1.5
    formula_alt: pe_ttm * pb <= 22.5
    pass_logic: OR
    weight: 2
    score_if_pass: 2
    score_if_fail: 0
    data_source: valuation.pb
    notes: |
      v2.5 实现 OR 条件:PB ≤ 1.5 主条件,PE×PB ≤ 22.5 替代条件
      高 ROE 公司允许更高 PB(茅台 PE 25 × PB 8 = 200 不通过;
      但若 PE 18 × PB 1.2 = 21.6 通过)

  # v2.5 G4:Net-Net 深度低估 critical bonus
  - id: ncav_critical_bonus
    name: 极度低估(市值 < NCAV × 2/3)
    formula: market_cap < ncav * 0.67
    weight: 3
    score_if_pass: 3       # critical bonus
    score_if_fail: 0
    derived: compute_ncav  # v2.5 G4:graham_extras.py 实现
    notes: |
      A 股几乎跑不出,但触发即极端低估信号
      NCAV = current_assets - total_liabilities(从 safety + balance sheet)

# Graham Number 与市价对比
graham_number_check:
  formula: market_price / graham_number
  ratings:
    extremely_cheap: "< 0.5"         # 极度低估
    cheap: "0.5-0.8"                 # 低估
    fair: "0.8-1.2"                  # 合理
    expensive: "> 1.2"               # 高估

# A 股 15 家公司预期
expected_a_share_fit:
  - 12_招商银行:    8-10  # 银行天然符合 Graham
  - 13_伊利股份:    7-9
  - 07_美的集团:    6-8
  - 11_五粮液:      4-6   # PE 偏高
  - 06_贵州茅台:    2-4   # PE PB 都过高（不符合防御型,v2.5 G2 后 PE×PB 救助有限）
  - 16_宁德时代:    2-4   # 成长型，不适用
  - 10_比亚迪:      2-4   # 同上

exclude_industries:
  - 早期亏损成长股               # 不适用 Graham
  - 高估值科技                   # 不符合 PE/PB 门槛

# 与项目知识库对照
knowledge_reference:
  - ../../01_knowledge/03_投资策略与选股/01_价值投资法/01_商业模式理解.md
  - ../../01_knowledge/03_投资策略与选股/01_价值投资法/02_盈利分析.md
  - ../../01_knowledge/03_投资策略与选股/01_价值投资法/03_财务健康分析.md
  - ../../01_knowledge/03_投资策略与选股/01_价值投资法/04_估值分析.md
  - ../../01_knowledge/03_投资策略与选股/01_价值投资法/05_深度审视.md

