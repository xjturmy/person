master: graham
master_cn: 本杰明·格雷厄姆
method: 防御型投资者 7 项标准 + Graham Number
score_type: composite
max_score: 10
description: |
  深度价值投资法 — 用安全边际买便宜资产。
  组合：防御型投资者 7 项硬指标（《聪明的投资者》第 14 章）
       + Graham Number 估值上限（√(22.5 × EPS × BVPS)）
       + 净流动资产估值（Net-Net）

  核心思想：5 毛钱买 1 块钱的资产 → 安全边际为王

threshold:
  excellent: 8
  good: 6
  warning: 4

# Graham Number 估值公式
graham_number:
  formula: sqrt(22.5 * eps * bvps)
  meaning: 防御型投资者的"合理价格上限"
  origin: 22.5 = 15(PE 上限) × 1.5(PB 上限)
  rule: 当前股价 < Graham Number → 估值合理偏低

# Net-Net 净流动资产估值（深度价值）
net_net:
  formula: |
    NCAV = current_assets - total_liabilities
    NetNet_per_share = NCAV / shares_outstanding
  rule: 当前股价 < NetNet × 2/3 → 极度低估
  caution: |
    A 股极少出现（市场效率较高）；
    适合熊市底部 / 困境反转投资

# 防御型投资者 7 项硬指标（《聪明的投资者》Ch.14）
rules:
  - id: g1_size
    name: 公司规模充足
    formula: market_cap >= 5e10           # A 股标准：500 亿元（原版 USD 2 亿放大）
    weight: 1
    score_if_pass: 1
    score_if_fail: 0
    notes: 排除小盘股（流动性 + 经营稳定性）

  - id: g2_financial_strength
    name: 财务结构稳健
    formula: current_ratio >= 2.0 AND long_term_debt <= net_current_assets
    weight: 1
    score_if_pass: 1
    score_if_fail: 0
    data_source: safety
    notes: 流动比率 ≥ 2 + 长期负债 ≤ 净流动资产

  - id: g3_earnings_stability
    name: 盈利稳定性（10 年无亏损）
    formula: min(earnings_per_share, 10) > 0
    weight: 2
    score_if_pass: 2
    score_if_fail: 0
    data_source: profitability
    notes: 过去 10 年每年都盈利

  - id: g4_dividend_record
    name: 持续派息记录
    formula: years_continuous_dividend >= 10        # 原版要求 20 年，A 股放宽到 10 年
    weight: 1
    score_if_pass: 1
    score_if_fail: 0
    data_source: valuation.dividend_yield
    notes: A 股放宽（公司历史短）

  - id: g5_earnings_growth
    name: 盈利增长（10 年 ≥ 33%）
    formula: cagr(eps_3y_avg, 10) >= 0.029           # 33% 累计 ≈ 2.9% CAGR
    weight: 1
    score_if_pass: 1
    score_if_fail: 0
    notes: 用 3 年平均 EPS 平滑波动

  - id: g6_pe_moderate
    name: 市盈率温和（≤ 15）
    formula: pe_ttm <= 15
    weight: 2
    score_if_pass: 2
    score_if_fail: 0
    data_source: valuation.pe_ttm

  - id: g7_pb_moderate
    name: 市净率温和（≤ 1.5）
    formula: pb <= 1.5
    weight: 2
    score_if_pass: 2
    score_if_fail: 0
    data_source: valuation.pb
    notes: |
      可放宽：PE × PB ≤ 22.5 也通过
      （高 ROE 公司允许更高 PB）

# Graham Number 与市价对比
graham_number_check:
  formula: market_price / graham_number
  ratings:
    extremely_cheap: < 0.5         # 极度低估
    cheap: 0.5-0.8                  # 低估
    fair: 0.8-1.2                   # 合理
    expensive: > 1.2                # 高估

# A 股 15 家公司预期
expected_a_share_fit:
  - 12_招商银行:    8-10  # 银行天然符合 Graham
  - 13_伊利股份:    7-9
  - 07_美的集团:    6-8
  - 11_五粮液:      4-6   # PE 偏高
  - 06_贵州茅台:    2-4   # PE PB 都过高（不符合防御型）
  - 16_宁德时代:    2-4   # 成长型，不适用
  - 10_比亚迪:      2-4   # 同上

exclude_industries:
  - 早期亏损成长股               # 不适用 Graham
  - 高估值科技                   # 不符合 PE/PB 门槛

# 与项目知识库对照
knowledge_reference:
  - ../../01_knowledge/03_投资策略与选股/01_价值投资法/01_商业模式理解.md
  - ../../01_knowledge/03_投资策略与选股/01_价值投资法/02_盈利分析.md
