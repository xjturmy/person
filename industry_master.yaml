# industry_master.yaml — 行业主索引(D1)
# 生成日期: 2026-05-10
# 任务包: v2.5 行业分析与聚焦 / 01_knowledge
#
# 字段约定:
#   code     大写英文唯一 ID
#   name     SW L2 行业名(精确匹配 .config/companies.csv 的 industry_l2 列,不带罗马数字)
#   sw_l1    SW L1 行业大类
#   type     林奇六类:stalwart / fast_grower / cyclical / slow_grower / bank / insurance
#   summary  一句行业概览(30-60 字)
#   cycle_attrs.type  成长 / 价值 / 防御 / 周期
#   cycle_attrs.kondratieff_position  康波 5 阶段中的定位
#   cycle_attrs.key_indicators 3-5 条关键观察指标
#   etf_codes 推荐 ETF code 列表(2-4 只,必须从 etf.duckdb 实有 35 只中挑)
#   knowledge_md  对应 D2 知识 md 相对路径
#   leaders   行业龙头 ticker 列表(2-4 只)
#
# 8 重点行业(必填,与 .config/focus_industries.yaml 对齐):
#   白酒 / 化学制药 / 股份制银行 / 保险 / 电池 / 通信设备 / 白色家电 / 饮料乳品

